name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate repository contracts
        shell: pwsh
        run: ./scripts/validate-repository.ps1

      - name: Validate example outputs against schemas
        run: python scripts/validate_schema_examples.py

      - name: Run semantic test suite
        run: pytest -q
