name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install seoctl editable package
        run: python -m pip install -e . --no-deps

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Validate canonical skill convergence
        run: python scripts/validate_canonical_skill_consistency.py

      - name: Validate release-version consistency
        run: python scripts/validate_release_version.py

      - name: Validate comparative rebaseline and capability ledger
        run: python scripts/inventory_comparator.py

      - name: Validate controlled improvement governance
        id: improvement_governance
        continue-on-error: true
        shell: bash
        run: python scripts/validate_improvement_evidence.py 2>&1 | tee improvement-governance.json

      - name: Upload improvement governance result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: improvement-governance-${{ matrix.os }}-${{ matrix.python-version }}
          path: improvement-governance.json
          if-no-files-found: error

      - name: Enforce controlled improvement governance
        if: steps.improvement_governance.outcome == 'failure'
        run: python -c "import sys; sys.exit(1)"

      - name: Validate seoctl registry and generated docs
        run: |
          seoctl --registry-check
          python scripts/generate_command_docs.py --check

      - name: Run multi-agent tracer gate
        run: python evaluation/tracer/run_tracer.py

      - name: Validate legacy repository contracts
        shell: pwsh
        run: ./scripts/validate-repository.ps1

      - name: Validate example outputs against schemas
        run: python scripts/validate_schema_examples.py

      - name: Run semantic and runtime test suite
        id: pytest
        continue-on-error: true
        run: pytest -q --junitxml=pytest-results.xml

      - name: Upload pytest result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.os }}-${{ matrix.python-version }}
          path: pytest-results.xml
          if-no-files-found: error

      - name: Enforce pytest result
        if: steps.pytest.outcome == 'failure'
        run: python -c "import sys; sys.exit(1)"
