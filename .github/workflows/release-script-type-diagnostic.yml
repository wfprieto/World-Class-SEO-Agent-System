name: Release Script Type Diagnostic

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install quality dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run release and security script type check
        shell: bash
        run: |
          mkdir -p outputs
          set +e
          python -m mypy scripts/scan_secrets.py scripts/generate_sbom.py scripts/generate_release_manifest.py \
            scripts/validate_release_artifacts.py scripts/run_performance_benchmarks.py \
            scripts/run_security_mutation_checks.py scripts/validate_seo_claims.py \
            scripts/validate_product_claims.py scripts/validate_product_proof_program.py \
            --ignore-missing-imports --check-untyped-defs > outputs/release-script-mypy.txt 2>&1
          code=$?
          cat outputs/release-script-mypy.txt
          echo "EXIT_CODE=$code" >> outputs/release-script-mypy.txt
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: release-script-mypy
          path: outputs/release-script-mypy.txt
          if-no-files-found: error
