name: Release Script Type Diagnostic

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install quality dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run release and security script type check
        shell: bash
        run: |
          mkdir -p evaluation
          set +e
          {
            echo '# Release and Security Script Mypy Diagnostic'
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo '```text'
            python -m mypy scripts/scan_secrets.py scripts/generate_sbom.py scripts/generate_release_manifest.py \
              scripts/validate_release_artifacts.py scripts/run_performance_benchmarks.py \
              scripts/run_security_mutation_checks.py scripts/validate_seo_claims.py \
              scripts/validate_product_claims.py scripts/validate_product_proof_program.py \
              --ignore-missing-imports --check-untyped-defs
            code=$?
            echo
            echo "EXIT_CODE=$code"
            echo '```'
          } > evaluation/release-script-mypy.md 2>&1
          cat evaluation/release-script-mypy.md
      - name: Commit diagnostic report
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evaluation/release-script-mypy.md
          git commit -m 'chore: record release script mypy diagnostic [skip ci]' || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
