name: Canonical Regeneration

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e '.[dev]'
      - name: Repair and regenerate canonical assets
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('knowledge/seo-claim-registry.json')
          text = path.read_text(encoding='utf-8')
          text = text.replace('LAGRE_SCALE_OBSERVATIONAL', 'LARGE_SCALE_OBSERVATIONAL')
          path.write_text(text, encoding='utf-8')
          PY
          python scripts/generate_skill_index.py
          python scripts/generate_command_docs.py
          python scripts/validate_seo_claims.py
          python scripts/generate_skill_index.py --check
          python scripts/generate_command_docs.py --check
      - name: Commit canonical outputs
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add knowledge/seo-claim-registry.json skills/SKILL_INDEX.md docs/COMMANDS.md
          git commit -m 'Regenerate canonical SEO registries and docs [skip ci]' || exit 0
          git push