name: Secret Fixture Remediation

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  remediate:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Replace credential-shaped test literals
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/test_google_first_party.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'top-secret-key': 'test-placeholder-api-key',
              'direct-token': 'test-placeholder-access-token',
          }
          for old, new in replacements.items():
              if old not in text and new not in text:
                  raise SystemExit(f'missing expected test literal: {old}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Verify affected tests and scanner
        run: |
          python -m pytest -q tests/test_google_first_party.py
          python scripts/scan_secrets.py
      - name: Commit verified remediation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/test_google_first_party.py
          git commit -m 'Use explicit placeholders in Google credential tests' || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
