name: Secret Scan Diagnostic

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Run scanner
        shell: bash
        run: |
          mkdir -p evaluation
          python scripts/scan_secrets.py --json > evaluation/secret-scan-diagnostic.json || true
          cat evaluation/secret-scan-diagnostic.json
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evaluation/secret-scan-diagnostic.json
          git commit -m 'chore: record secret scan diagnostic [skip ci]' || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
