name: Full Mypy Diagnostic

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: full-mypy-diagnostic-main
  cancel-in-progress: true

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Run full mypy and tests
        shell: bash
        run: |
          set +e
          mkdir -p evaluation
          {
            echo '# Full Mypy Diagnostic'
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo '## Mypy'
            echo '```text'
            python -m mypy runtime seoctl integrations adapters
            mypy_code=$?
            echo
            echo "EXIT_CODE=$mypy_code"
            echo '```'
            echo
            echo '## Pytest'
            echo '```text'
            python -m pytest -q
            pytest_code=$?
            echo
            echo "EXIT_CODE=$pytest_code"
            echo '```'
          } > evaluation/type-diagnostic.md 2>&1
          cat evaluation/type-diagnostic.md
      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evaluation/type-diagnostic.md
          git commit -m 'chore: record full mypy diagnostic [skip ci]' || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
