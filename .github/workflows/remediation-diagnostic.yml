name: Remediation Diagnostic

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Run diagnostic gates
        shell: bash
        run: |
          set +e
          mkdir -p evaluation
          {
            echo '# Remediation CI Diagnostic'
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            for cmd in \
              "seoctl --registry-check" \
              "python scripts/validate_seo_claims.py" \
              "python scripts/validate_product_proof_program.py" \
              "python scripts/validate_product_claims.py" \
              "python -m pytest -q" \
              "python -m mypy runtime seoctl integrations adapters"; do
              echo '## Command'
              echo '```text'
              echo "$cmd"
              echo '```'
              echo '## Output'
              echo '```text'
              bash -lc "$cmd" 2>&1
              code=$?
              echo
              echo "EXIT_CODE=$code"
              echo '```'
              echo
            done
          } > evaluation/ci-diagnostic.md
          cat evaluation/ci-diagnostic.md
      - name: Commit diagnostic report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add evaluation/ci-diagnostic.md
          git commit -m 'chore: record remediation diagnostics [skip ci]' || exit 0
          git push